<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Filler</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>Smart Fill</h1>
    <p class="subtitle">Fill forms instantly</p>

    <div class="button-group">
      <button id="fillRandom" class="btn btn-primary">Fill Random Data</button>
      <button id="saveProfile" class="btn btn-save">Save Current Form</button>
      <button id="fillAI" class="btn btn-ai">AI Fill</button>
    </div>

    <p id="statusMsg" class="status-msg"></p>

    <div class="divider"></div>

    <p class="section-label">Saved Profiles</p>
    <div id="profilesList" class="profiles-list">
      <p class="empty-msg">No saved profiles yet.</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
